{% extends 'base.html' %}

{% block title %}Upload Resume - ResuMate AI{% endblock %}

{% block content %}
<div class="container form-wrapper">
    <div class="card auth-card" style="max-width: 550px;">
        <div class="form-header">
            <h2>Upload Resume</h2>
            <p>PDF or DOCX format, up to 5MB</p>
        </div>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">Resume Title</label>
                <input type="text" name="title" id="title" class="form-input" required placeholder="e.g., Senior Software Engineer CV" value="My Resume">
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="file">Resume File (PDF, DOCX)</label>
                <!-- File Input styling using glassmorphism -->
                <div style="border: 2px dashed var(--glass-border); border-radius: var(--radius-md); padding: 2rem; text-align: center; background: rgba(255,255,255,0.01); transition: var(--transition-smooth); cursor: pointer;" onclick="document.getElementById('file').click();" onmouseover="this.style.borderColor='var(--primary)';" onmouseout="this.style.borderColor='var(--glass-border)';">
                    <i data-lucide="upload-cloud" style="width: 48px; height: 48px; color: var(--text-secondary); margin-bottom: 0.8rem;"></i>
                    <p style="font-size: 0.9rem; color: var(--text-primary); font-weight: 500;">Click to browse files</p>
                    <p id="file-name-display" style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; word-break: break-all;">No file selected</p>
                    <input type="file" name="file" id="file" required style="display: none;" accept=".pdf,.docx" onchange="document.getElementById('file-name-display').innerText = this.files[0] ? this.files[0].name : 'No file selected';">
                </div>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <a href="{% url 'dashboard' %}" class="btn btn-secondary" style="flex: 1;">Cancel</a>
                <button type="submit" class="btn btn-primary" style="flex: 1;">
                    Upload & Parse <i data-lucide="arrow-right"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Login - ResuMate AI{% endblock %}

{% block content %}
<div class="container form-wrapper">
    <div class="card auth-card">
        <div class="form-header">
            <h2>Welcome Back</h2>
            <p>Enter your details to access your account</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-input" required placeholder="name@example.com" autocomplete="email">
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="password">Password</label>
                    <a href="#" style="font-size: 0.8rem; color: var(--text-muted);">Forgot password?</a>
                </div>
                <input type="password" name="password" id="password" class="form-input" required placeholder="••••••••" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">
                Login Account <i data-lucide="log-in"></i>
            </button>
            
            <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
                Don't have an account? <a href="{% url 'register' %}" style="font-weight: 600; color: var(--primary);">Sign Up</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
